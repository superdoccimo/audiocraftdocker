name: Docker Build Test

on:
  push:
    paths:
      - 'Dockerfile.*'
      - '.github/workflows/docker-build-test.yml'
  pull_request:
    paths:
      - 'Dockerfile.*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cuda: [121, 124, 128, 129, 132]
    steps:
      - uses: actions/checkout@v4

      - name: Build Dockerfile.cuda${{ matrix.cuda }}
        run: |
          docker build -f Dockerfile.cuda${{ matrix.cuda }} -t audiocraft:cuda${{ matrix.cuda }} .

      - name: Test basic import (CPU mode)
        run: |
          docker run --rm -e CUDA_VISIBLE_DEVICES="" audiocraft:cuda${{ matrix.cuda }} \
            python -c "
          import importlib, sys
          # Test core dependencies load (some may fail without GPU libs, that's OK)
          for mod in ['torch', 'transformers', 'gradio']:
              try:
                  importlib.import_module(mod)
                  print(f'{mod} import OK')
              except Exception as e:
                  print(f'{mod} import FAILED: {e}', file=sys.stderr)
                  sys.exit(1)
          # audiocraft import may fail on torchaudio without CUDA libs - warn only
          try:
              import audiocraft
              print('audiocraft import OK')
          except Exception as e:
              print(f'audiocraft import skipped (expected without GPU): {e}')
          "
